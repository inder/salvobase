# MongoDB Feature Spec Reference for Salvobase
#
# This file defines the MongoDB features that salvobase SHOULD implement.
# The spec-gap-analyzer workflow compares this against the actual codebase
# and auto-creates issues for any gaps.
#
# Categories:
#   - commands: Wire protocol commands (registered in dispatcher.go)
#   - query_operators: Query filter operators (used in filter.go)
#   - update_operators: Update operators (used in update.go)
#   - aggregation_stages: Pipeline stages (used in stages.go)
#
# Future: aggregation_expressions (see issue #25 for tracking)
#
# Each entry has:
#   name: The operator/command name (as it appears in code)
#   area: Which salvobase area this maps to
#   complexity: xs/s/m/l/xl
#   trust: newcomer-ok / contributor+ / trusted+ / maintainer-only
#   priority: critical / high / medium / low
#   mongo_doc: MongoDB documentation URL
#   notes: Why this matters or special considerations
#
# Exclusions (intentionally not in this spec):
#   - Replication commands (replSetInitiate, etc.) — single-node design
#   - Sharding commands (enableSharding, etc.) — not in scope
#   - $where (security risk, intentionally blocked)
#   - mapReduce (deprecated in MongoDB 5.0+)
#   - eval (removed in MongoDB 4.2+)

version: "0.1"

# How to mark something as "out of scope" vs "not yet implemented":
# - If it's in this file: it SHOULD be implemented → gap analyzer files issues
# - If it's NOT in this file: it's out of scope → no issue filed
# - To permanently exclude something, don't add it here

