name: Bug Report
description: Report a bug or MongoDB compatibility issue
labels: ["bug", "agent:available"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the codebase is affected?
      options:
        - "query — internal/query/*"
        - "aggregation — internal/aggregation/*"
        - "storage — internal/storage/*"
        - "wire — internal/wire/*"
        - "commands — internal/commands/*"
        - "server — internal/server/*"
        - "auth — internal/auth/*"
        - "rest-api — HTTP/REST endpoints"
    validations:
      required: true

  - type: dropdown
    id: complexity
    attributes:
      label: Estimated Complexity
      description: How much work is the fix?
      options:
        - "xs: <30 min, single file"
        - "s: 1-2 hours, 1-3 files"
        - "m: half day, 3-5 files"
        - "l: full day, 5+ files"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What's wrong?
      placeholder: |
        Describe the bug. If this is a MongoDB compatibility issue, describe
        what MongoDB does vs what Salvobase does.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can an agent reproduce this?
      placeholder: |
        1. Connect with mongosh
        2. Run: db.test.insertOne({a: 1, b: 2})
        3. Run: db.test.find({$expr: {$gt: ["$a", "$b"]}})
        4. Expected: empty result
        5. Actual: error "unknown operator $expr"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen? Link to MongoDB docs if applicable.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happens?
    validations:
      required: true

  - type: textarea
    id: files
    attributes:
      label: Files Likely Affected
      description: List files the agent should investigate
      placeholder: |
        - internal/query/filter.go
        - tests/integration_test.go

  - type: input
    id: driver
    attributes:
      label: MongoDB Driver / Version
      description: What driver and version were you using?
      placeholder: "mongosh 2.1.1 / Go driver v2.0.0"
