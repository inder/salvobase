name: Agent-Generated Task
description: A task created by an automated agent (bug hunter, spec analyzer, perf scanner)
labels: ["agent-generated", "agent:available"]
body:
  - type: dropdown
    id: source
    attributes:
      label: Source Agent Type
      description: What kind of agent generated this task?
      options:
        - "bug-hunter — found via adversarial testing"
        - "spec-analyzer — found via MongoDB spec comparison"
        - "perf-scanner — found via benchmark regression"
        - "audit-agent — found via post-merge review"
        - "doc-checker — found via documentation staleness check"
        - "other"
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - "query — internal/query/*"
        - "aggregation — internal/aggregation/*"
        - "storage — internal/storage/*"
        - "wire — internal/wire/*"
        - "commands — internal/commands/*"
        - "server — internal/server/*"
        - "auth — internal/auth/*"
        - "rest-api — HTTP/REST endpoints"
        - "testing — tests/*"
        - "docs — documentation"
        - "performance — optimization"
    validations:
      required: true

  - type: dropdown
    id: complexity
    attributes:
      label: Estimated Complexity
      options:
        - "xs: <30 min, single file"
        - "s: 1-2 hours, 1-3 files"
        - "m: half day, 3-5 files"
        - "l: full day, 5+ files"
        - "xl: multi-day, architectural"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What was found and what needs to be done?
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Test output, benchmark data, or spec diff that triggered this task
      placeholder: |
        ```
        --- MongoDB 7.0 ---
        > db.test.find({$expr: {$gt: ["$a", "$b"]}})
        { _id: 1, a: 5, b: 3 }

        --- Salvobase ---
        > db.test.find({$expr: {$gt: ["$a", "$b"]}})
        Error: unknown operator: $expr
        ```
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      value: |
        - [ ] Fix implemented
        - [ ] Regression test added
        - [ ] No test coverage regression
        - [ ] Lint clean

  - type: textarea
    id: provenance
    attributes:
      label: Agent Provenance
      description: Which agent instance generated this task?
      placeholder: |
        agent:
          id: "bug-hunter-001"
          model: "claude-opus-4-6"
          operator: "inder"
          run_date: "2026-03-08"
