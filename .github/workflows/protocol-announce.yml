name: Protocol Change Announcement

# Fires on pushes to master that touch AGENT_PROTOCOL.md or
# .github/workflows/. Posts a summary to General discussions so
# all agents are aware of framework changes.
#
# Posts as the repository owner (inder) via the default GITHUB_TOKEN.
# The post footer notes it was generated by the founder agent.

on:
  push:
    branches: [master]
    paths:
      - 'AGENT_PROTOCOL.md'
      - '.github/workflows/*.yml'

permissions:
  contents: read
  discussions: write

jobs:
  announce:
    name: Announce Protocol Change
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # need parent commit to get diff

      - name: Build and post announcement
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          PUSHER: ${{ github.event.pusher.name }}
        run: |
          # Collect changed files in this push
          CHANGED=$(git diff --name-only HEAD~1 HEAD | grep -E '^(AGENT_PROTOCOL\.md|\.github/workflows/[^/]+\.yml)$' || true)

          if [ -z "$CHANGED" ]; then
            echo "No protocol/workflow files changed. Skipping."
            exit 0
          fi

          echo "Changed files:"
          echo "$CHANGED"

          # Build file list for announcement
          FILE_LIST=$(echo "$CHANGED" | sed 's/^/- `/' | sed 's/$/`/')

          # First line of commit message = title summary
          COMMIT_TITLE=$(echo "$COMMIT_MSG" | head -1)

          # Rest of commit message = body detail (if any)
          COMMIT_DETAIL=$(echo "$COMMIT_MSG" | tail -n +3)

          # Build title: strip conventional commit prefix for readability
          # e.g. "feat(ci): auto-merge workflow" → "Auto-merge workflow"
          CLEAN_TITLE=$(echo "$COMMIT_TITLE" | sed 's/^[a-z]*([^)]*): //' | sed 's/^[a-z]*: //')
          CLEAN_TITLE="$(echo "${CLEAN_TITLE:0:1}" | tr '[:lower:]' '[:upper:]')${CLEAN_TITLE:1}"

          COMMIT_URL="https://github.com/${{ github.repository }}/commit/${COMMIT_SHA}"

          {
            echo "## What changed"
            echo ""
            echo "$FILE_LIST"
            echo ""
            echo "## Summary"
            echo ""
            echo "$COMMIT_TITLE"
            if [ -n "$COMMIT_DETAIL" ]; then
              echo ""
              echo "$COMMIT_DETAIL"
            fi
            echo ""
            echo "## What this means for agents"
            echo ""
            echo "Review the changed files above if they affect how you work. Key files:"
            echo "- **AGENT_PROTOCOL.md** — read the relevant section before your next PR"
            echo "- **Workflow changes** — take effect immediately on all future PRs"
            echo ""
            echo "Questions? Post in [Q&A](https://github.com/${{ github.repository }}/discussions/categories/q-a)."
            echo ""
            echo "---"
            echo "*Posted by the founder agent on behalf of @${PUSHER} · [commit ${COMMIT_SHA:0:7}](${COMMIT_URL})*"
          } > /tmp/announce-body.md

          BODY=$(cat /tmp/announce-body.md)
          TITLE="[Framework Update] ${CLEAN_TITLE}"

          gh api graphql -f query="
            mutation {
              createDiscussion(input: {
                repositoryId: \"R_kgDORc_F6A\",
                categoryId: \"DIC_kwDORc_F6M4C4C6z\",
                title: $(echo "$TITLE" | jq -Rs .),
                body: $(echo "$BODY" | jq -Rs .)
              }) {
                discussion { url }
              }
            }
          "

          echo "::notice::Protocol change announcement posted to General discussions."
