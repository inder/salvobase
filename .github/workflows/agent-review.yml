name: Agent Review Gate

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review-gate:
    name: Review Gate
    runs-on: ubuntu-latest
    if: "!github.event.pull_request.draft"
    steps:
      - uses: actions/checkout@v4

      - name: Parse PR body for agent identity
        id: parse-identity
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          # Look for agent identity YAML block between ``` markers
          # Extract fields only from within the agent: block to avoid spoofing
          if echo "$PR_BODY" | grep -q "trust_tier:"; then
            TRUST=$(echo "$PR_BODY" | grep "trust_tier:" | head -1 | sed 's/.*trust_tier:[[:space:]]*"\{0,1\}\([^"]*\)"\{0,1\}.*/\1/' | tr -d ' ')
            echo "is_agent=true" >> $GITHUB_OUTPUT
            echo "trust_tier=$TRUST" >> $GITHUB_OUTPUT
          else
            echo "is_agent=false" >> $GITHUB_OUTPUT
            echo "trust_tier=none" >> $GITHUB_OUTPUT
          fi

      - name: Enforce protected paths
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          TRUST_TIER: ${{ steps.parse-identity.outputs.trust_tier }}
        run: |
          # Get list of changed files
          CHANGED_FILES=$(gh pr diff $PR_NUMBER --name-only --repo ${{ github.repository }})

          NEEDS_HUMAN="false"
          REASON=""

          while IFS= read -r filepath; do
            case "$filepath" in
              internal/auth/*)
                NEEDS_HUMAN="true"
                REASON="${REASON}  - \`$filepath\` (auth — always requires human review)\n"
                ;;
              internal/wire/protocol.go)
                NEEDS_HUMAN="true"
                REASON="${REASON}  - \`$filepath\` (wire protocol — always requires human review)\n"
                ;;
              AGENT_PROTOCOL.md)
                NEEDS_HUMAN="true"
                REASON="${REASON}  - \`$filepath\` (protocol spec — always requires human review)\n"
                ;;
              .github/workflows/*)
                NEEDS_HUMAN="true"
                REASON="${REASON}  - \`$filepath\` (CI/CD workflows — always requires human review)\n"
                ;;
              .github/agents/registry.yml)
                NEEDS_HUMAN="true"
                REASON="${REASON}  - \`$filepath\` (agent registry — always requires human review)\n"
                ;;
            esac
          done <<< "$CHANGED_FILES"

          if [ "$NEEDS_HUMAN" = "true" ]; then
            echo "::warning::Protected paths modified. Adding human-review-required label."
            gh pr edit $PR_NUMBER --add-label "human-review-required" --repo ${{ github.repository }} || true
            gh pr comment $PR_NUMBER --body "$(printf '### Protected Path Gate\n\nThis PR modifies protected paths that require human review:\n\n%b\n\nA human maintainer must approve before this can be merged.' "$REASON")" --repo ${{ github.repository }}
          fi

      - name: Enforce newcomer gate
        if: steps.parse-identity.outputs.trust_tier == 'newcomer'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          echo "::notice::Newcomer agent PR — founder agent or human approval required."
          gh pr edit $PR_NUMBER --add-label "newcomer-pr" --repo ${{ github.repository }} || true
          gh pr comment $PR_NUMBER --body "### Newcomer Gate

This PR is from a **newcomer** agent. Per the [Agent Protocol](AGENT_PROTOCOL.md#2-trust-tiers), newcomer PRs require approval from the **founder agent** (operator: \`inder\`) or a human maintainer.

The founder agent can review and approve this PR on behalf of the project." --repo ${{ github.repository }}

      - name: Check for veto
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          COMMENTS=$(gh pr view $PR_NUMBER --json comments --repo ${{ github.repository }})
          if echo "$COMMENTS" | jq -r '.comments[].body' | grep -q "^/veto"; then
            echo "::error::This PR has been vetoed by a maintainer."
            exit 1
          fi
