name: Nightly Benchmark

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write   # needed to commit results back
  issues: write     # needed to file failure issues

env:
  # Reduced from 100k — CI runners are shared, 100k records × 2 dbs × 24 combos = hours.
  # 10k records still produces statistically meaningful ratios.
  RECORD_COUNT: "10000"
  OPERATION_COUNT: "10000"

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build salvobase
        run: go build -o ./bin/salvobase ./cmd/mongod

      - name: Start bench stack
        run: |
          docker compose -f deployments/bench/docker-compose.yml --profile bench up -d

      - name: Wait for services
        run: |
          echo "Waiting for Salvobase health endpoint..."
          for i in $(seq 1 30); do
            if wget -qO- http://localhost:27080/health >/dev/null 2>&1; then
              echo "Salvobase ready after ${i}x2s"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "ERROR: Salvobase never became healthy" >&2
              docker compose -f deployments/bench/docker-compose.yml --profile bench logs salvobase >&2
              exit 1
            fi
            sleep 2
          done

          echo "Waiting for MongoDB..."
          for i in $(seq 1 30); do
            if docker exec bench-mongodb mongosh --eval "db.runCommand({ping:1})" --quiet >/dev/null 2>&1; then
              echo "MongoDB ready after ${i}x2s"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "ERROR: MongoDB never became healthy" >&2
              docker compose -f deployments/bench/docker-compose.yml --profile bench logs mongodb >&2
              exit 1
            fi
            sleep 2
          done

      - name: Install go-ycsb
        run: |
          # go install fails because go-ycsb uses replace directives in go.mod.
          # Clone and build from source instead.
          git clone --depth=1 https://github.com/pingcap/go-ycsb.git /tmp/go-ycsb
          cd /tmp/go-ycsb && go build -o /usr/local/bin/go-ycsb ./cmd/go-ycsb

      - name: Run benchmarks
        run: |
          DATE=$(date -u +%Y-%m-%d)
          COMMIT=$(git rev-parse --short HEAD)
          mkdir -p benchmarks/results

          for WORKLOAD in A B C D E F; do
            for THREADS in 1 4 8 16; do
              echo "--- Workload ${WORKLOAD} / ${THREADS} threads ---"

              # Salvobase — tee raw output to a debug file so failures are diagnosable
              RECORD_COUNT=$RECORD_COUNT \
              OPERATION_COUNT=$OPERATION_COUNT \
              TARGET_URL=mongodb://localhost:27017 \
              WORKLOAD=$WORKLOAD \
              THREADS=$THREADS \
                bash scripts/bench/run_ycsb.sh \
                2>/tmp/ycsb_stderr_salvobase_${WORKLOAD}_${THREADS}.txt \
                | tee /tmp/ycsb_raw_salvobase_${WORKLOAD}_${THREADS}.txt \
                | python3 scripts/bench/parse_ycsb.py \
                  --target salvobase \
                  --workload "$WORKLOAD" \
                  --threads "$THREADS" \
                  --commit "$COMMIT" \
                  --date "$DATE" \
                >> "benchmarks/results/${DATE}.jsonl" \
                || { echo "WARN: salvobase W${WORKLOAD}/T${THREADS} parse failed"; \
                     echo "=== stderr ===" >&2; \
                     cat /tmp/ycsb_stderr_salvobase_${WORKLOAD}_${THREADS}.txt >&2; \
                     echo "=== raw stdout ===" >&2; \
                     cat /tmp/ycsb_raw_salvobase_${WORKLOAD}_${THREADS}.txt >&2; }

              # MongoDB Community
              RECORD_COUNT=$RECORD_COUNT \
              OPERATION_COUNT=$OPERATION_COUNT \
              TARGET_URL=mongodb://localhost:27018 \
              WORKLOAD=$WORKLOAD \
              THREADS=$THREADS \
                bash scripts/bench/run_ycsb.sh \
                2>/tmp/ycsb_stderr_mongodb_${WORKLOAD}_${THREADS}.txt \
                | tee /tmp/ycsb_raw_mongodb_${WORKLOAD}_${THREADS}.txt \
                | python3 scripts/bench/parse_ycsb.py \
                  --target mongodb \
                  --workload "$WORKLOAD" \
                  --threads "$THREADS" \
                  --commit "$COMMIT" \
                  --date "$DATE" \
                >> "benchmarks/results/${DATE}.jsonl" \
                || { echo "WARN: mongodb W${WORKLOAD}/T${THREADS} parse failed"; \
                     echo "=== stderr ===" >&2; \
                     cat /tmp/ycsb_stderr_mongodb_${WORKLOAD}_${THREADS}.txt >&2; \
                     echo "=== raw stdout ===" >&2; \
                     cat /tmp/ycsb_raw_mongodb_${WORKLOAD}_${THREADS}.txt >&2; }
            done
          done

      - name: Seed index from bench-data
        run: |
          # Pull the existing index.json from bench-data so update_index.py
          # can prepend today and preserve all historical dates instead of
          # starting fresh with only today's date on every run.
          git fetch origin bench-data:bench-data
          mkdir -p benchmarks
          git show bench-data:benchmarks/index.json > benchmarks/index.json 2>/dev/null \
            || echo '{"dates":[]}' > benchmarks/index.json

      - name: Update index
        run: python3 scripts/bench/update_index.py

      - name: Print ratio summary
        run: python3 scripts/bench/print_ratios.py "benchmarks/results/$(date -u +%Y-%m-%d).jsonl"

      - name: Commit results
        run: |
          DATE=$(date -u +%Y-%m-%d)
          # Push to bench-data (unprotected) — master requires CI status checks
          # that GITHUB_TOKEN cannot satisfy for direct pushes.
          # bench-data was already fetched in the "Seed index" step above.
          git worktree add /tmp/bench-data-worktree bench-data
          mkdir -p /tmp/bench-data-worktree/benchmarks/results
          cp -r benchmarks/results/. /tmp/bench-data-worktree/benchmarks/results/
          cp benchmarks/index.json /tmp/bench-data-worktree/benchmarks/ \
            || echo "WARN: index.json not found — skipping (update_index.py may have failed)"
          cd /tmp/bench-data-worktree
          git config user.name "salvobase-bot"
          git config user.email "salvobase-bot@users.noreply.github.com"
          git add benchmarks/
          git diff --cached --quiet || git commit -m "bench: nightly results ${DATE}"
          git push origin bench-data

      - name: File failure issue
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
        run: python3 scripts/bench/file_failure_issue.py

      - name: Teardown
        if: always()
        run: docker compose -f deployments/bench/docker-compose.yml --profile bench down
