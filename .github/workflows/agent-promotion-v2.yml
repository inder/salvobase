name: Agent Trust Promotion

# Fires on every merged PR. Checks if the author agent qualifies for a tier upgrade.
on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  check-promotion:
    name: Check Agent Promotion
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    steps:
      - uses: actions/checkout@v4

      - name: Extract and validate agent identity from PR body
        id: agent-id
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          # Parse agent identity block from the merged PR body
          AGENT_ID=$(echo "$PR_BODY" | grep -E '^\s*id:' | head -1 | sed 's/.*id:[[:space:]]*"\{0,1\}\([^"]*\)"\{0,1\}.*/\1/' | tr -d ' ')
          OPERATOR=$(echo "$PR_BODY" | grep -E '^\s*operator:' | head -1 | sed 's/.*operator:[[:space:]]*"\{0,1\}\([^"]*\)"\{0,1\}.*/\1/' | tr -d ' ')
          MODEL=$(echo "$PR_BODY" | grep -E '^\s*model:' | head -1 | sed 's/.*model:[[:space:]]*"\{0,1\}\([^"]*\)"\{0,1\}.*/\1/' | tr -d ' ')

          if [ -z "$AGENT_ID" ] || [ -z "$OPERATOR" ]; then
            echo "No agent identity found in PR body. Skipping."
            echo "has_agent=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # SECURITY: Validate all extracted values against strict character whitelist.
          # These values are interpolated into shell commands and git operations.
          for field_name in AGENT_ID OPERATOR MODEL; do
            field_value=$(eval echo "\$$field_name")
            if [ -n "$field_value" ] && ! echo "$field_value" | grep -qE '^[a-zA-Z0-9._-]+$'; then
              echo "::error::$field_name contains illegal characters: $field_value. Aborting."
              exit 1
            fi
          done

          # Read current tier from registry.yml (authoritative source), NOT from PR body.
          # The PR body's trust_tier is self-reported and untrusted.
          if grep -q "id: \"$AGENT_ID\"" .github/agents/registry.yml; then
            CURRENT_TIER=$(awk "/id: \"$AGENT_ID\"/{found=1} found && /trust_tier:/{print; exit}" .github/agents/registry.yml | sed 's/.*trust_tier:[[:space:]]*"\([^"]*\)".*/\1/')
            IN_REGISTRY="true"
          else
            CURRENT_TIER="newcomer"
            IN_REGISTRY="false"
          fi

          echo "agent_id=$AGENT_ID" >> $GITHUB_OUTPUT
          echo "operator=$OPERATOR" >> $GITHUB_OUTPUT
          echo "model=${MODEL:-unknown}" >> $GITHUB_OUTPUT
          echo "current_tier=$CURRENT_TIER" >> $GITHUB_OUTPUT
          echo "in_registry=$IN_REGISTRY" >> $GITHUB_OUTPUT
          echo "has_agent=true" >> $GITHUB_OUTPUT
          echo "Agent: $AGENT_ID (operator: $OPERATOR, model: $MODEL, tier: $CURRENT_TIER, in registry: $IN_REGISTRY)"

      - name: Count merged PRs for this agent
        if: steps.agent-id.outputs.has_agent == 'true'
        id: count
        env:
          GH_TOKEN: ${{ github.token }}
          AGENT_ID: ${{ steps.agent-id.outputs.agent_id }}
        run: |
          # Count all merged PRs that mention this agent ID in the body.
          # --limit 200 avoids the default 30-result pagination cap.
          MERGED_COUNT=$(gh pr list \
            --repo ${{ github.repository }} \
            --state merged \
            --limit 200 \
            --search "\"$AGENT_ID\" in:body" \
            --json number \
            --jq 'length' 2>/dev/null || echo "0")

          # Count reverted PRs (PRs with "Revert" in title that reference this agent)
          REVERT_COUNT=$(gh pr list \
            --repo ${{ github.repository }} \
            --state merged \
            --limit 200 \
            --search "Revert in:title \"$AGENT_ID\" in:body" \
            --json number \
            --jq 'length' 2>/dev/null || echo "0")

          # Net score: merged - (reverts * 3 penalty)
          PENALTY=$((REVERT_COUNT * 3))
          NET_SCORE=$((MERGED_COUNT - PENALTY))

          echo "merged=$MERGED_COUNT" >> $GITHUB_OUTPUT
          echo "reverted=$REVERT_COUNT" >> $GITHUB_OUTPUT
          echo "net_score=$NET_SCORE" >> $GITHUB_OUTPUT

          echo "Stats for $AGENT_ID: $MERGED_COUNT merged, $REVERT_COUNT reverted, net score $NET_SCORE"

      - name: Determine promotion eligibility
        if: steps.agent-id.outputs.has_agent == 'true'
        id: promote
        env:
          CURRENT_TIER: ${{ steps.agent-id.outputs.current_tier }}
          NET_SCORE: ${{ steps.count.outputs.net_score }}
          MERGED: ${{ steps.count.outputs.merged }}
          REVERTED: ${{ steps.count.outputs.reverted }}
        run: |
          NEW_TIER=""

          case "$CURRENT_TIER" in
            newcomer)
              # Promotion: 3+ net score, zero reverts
              if [ "$NET_SCORE" -ge 3 ] && [ "$REVERTED" -eq 0 ]; then
                NEW_TIER="contributor"
              fi
              ;;
            contributor)
              # Promotion: 10+ net score, <5% revert rate
              if [ "$NET_SCORE" -ge 10 ] && [ "$MERGED" -gt 0 ]; then
                REVERT_PERCENT=$((REVERTED * 100 / MERGED))
                if [ "$REVERT_PERCENT" -lt 5 ]; then
                  NEW_TIER="trusted"
                fi
              fi
              ;;
            trusted)
              # trusted -> maintainer is human-only. No auto-promotion.
              echo "trusted -> maintainer requires human designation. No auto-promotion."
              ;;
            maintainer)
              echo "Already at highest tier."
              ;;
          esac

          if [ -n "$NEW_TIER" ]; then
            echo "eligible=true" >> $GITHUB_OUTPUT
            echo "new_tier=$NEW_TIER" >> $GITHUB_OUTPUT
            echo "Agent eligible for promotion: $CURRENT_TIER -> $NEW_TIER"
          else
            echo "eligible=false" >> $GITHUB_OUTPUT
            echo "No promotion eligible. Current tier: $CURRENT_TIER, net score: $NET_SCORE"
          fi

      - name: Check if promotion branch already exists
        if: steps.promote.outputs.eligible == 'true'
        id: existing
        env:
          AGENT_ID: ${{ steps.agent-id.outputs.agent_id }}
          NEW_TIER: ${{ steps.promote.outputs.new_tier }}
        run: |
          # Use git ls-remote for atomic branch check (avoids GitHub search latency race)
          BRANCH="agent-promotion/${AGENT_ID}-to-${NEW_TIER}"
          if git ls-remote --heads origin "refs/heads/$BRANCH" | grep -q .; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Promotion branch already exists. Skipping."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create promotion PR
        if: steps.promote.outputs.eligible == 'true' && steps.existing.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          AGENT_ID: ${{ steps.agent-id.outputs.agent_id }}
          OPERATOR: ${{ steps.agent-id.outputs.operator }}
          MODEL: ${{ steps.agent-id.outputs.model }}
          CURRENT_TIER: ${{ steps.agent-id.outputs.current_tier }}
          IN_REGISTRY: ${{ steps.agent-id.outputs.in_registry }}
          NEW_TIER: ${{ steps.promote.outputs.new_tier }}
          MERGED: ${{ steps.count.outputs.merged }}
          REVERTED: ${{ steps.count.outputs.reverted }}
          NET_SCORE: ${{ steps.count.outputs.net_score }}
        run: |
          BRANCH="agent-promotion/${AGENT_ID}-to-${NEW_TIER}"

          git config user.name "salvobase-bot"
          git config user.email "salvobase-bot@users.noreply.github.com"
          git checkout -b "$BRANCH"

          if [ "$IN_REGISTRY" = "true" ]; then
            # Update existing entry using yq for safe YAML manipulation.
            # Falls back to awk if yq is not available.
            if command -v yq >/dev/null 2>&1; then
              yq eval "(.agents[] | select(.id == \"$AGENT_ID\") | .trust_tier) = \"$NEW_TIER\" |
                       (.agents[] | select(.id == \"$AGENT_ID\") | .stats.total_prs) = $MERGED |
                       (.agents[] | select(.id == \"$AGENT_ID\") | .stats.merged_prs) = $MERGED |
                       (.agents[] | select(.id == \"$AGENT_ID\") | .stats.reverted_prs) = $REVERTED" \
                -i .github/agents/registry.yml
            else
              # Fallback: use awk to update trust_tier for the specific agent block only.
              # This avoids the broken sed range that could modify the wrong agent.
              awk -v id="$AGENT_ID" -v old_tier="$CURRENT_TIER" -v new_tier="$NEW_TIER" '
                /id:/ && index($0, "\"" id "\"") { found=1 }
                found && /trust_tier:/ {
                  sub("\"" old_tier "\"", "\"" new_tier "\"")
                  found=0
                }
                { print }
              ' .github/agents/registry.yml > registry_tmp.yml && mv registry_tmp.yml .github/agents/registry.yml
            fi
          else
            # Agent not in registry — add a new entry.
            TODAY=$(date -u +%Y-%m-%d)
            {
              echo ""
              echo "  - id: \"$AGENT_ID\""
              echo "    operator: \"$OPERATOR\""
              echo "    model: \"$MODEL\""
              echo "    trust_tier: \"$NEW_TIER\""
              echo "    capabilities: []"
              echo "    stats:"
              echo "      total_prs: $MERGED"
              echo "      merged_prs: $MERGED"
              echo "      reverted_prs: $REVERTED"
              echo "    registered: \"$TODAY\""
              echo "    promoted: \"$TODAY\""
            } >> .github/agents/registry.yml
          fi

          git add .github/agents/registry.yml
          COMMIT_MSG=$(printf 'chore(agents): promote %s from %s to %s\n\nAgent %s (operator: %s) has met the promotion criteria:\n- Merged PRs: %s\n- Reverted PRs: %s\n- Net score: %s\n- Threshold for %s: met\n\nThis is an automated promotion. registry.yml is a protected path --\nthis PR requires owner or founder agent approval.\n\nGenerated by: agent-promotion workflow' \
            "$AGENT_ID" "$CURRENT_TIER" "$NEW_TIER" \
            "$AGENT_ID" "$OPERATOR" \
            "$MERGED" "$REVERTED" "$NET_SCORE" "$NEW_TIER")
          git commit -m "$COMMIT_MSG"

          git push origin "$BRANCH"

          # Build PR body
          CRITERIA=""
          if [ "$NEW_TIER" = "contributor" ]; then
            CRITERIA=$(printf '- [x] 3+ net merged PRs (have: %s)\n- [x] 0 reverts (have: %s)' "$NET_SCORE" "$REVERTED")
          elif [ "$NEW_TIER" = "trusted" ]; then
            CRITERIA=$(printf '- [x] 10+ net merged PRs (have: %s)\n- [x] <5%% revert rate (have: %s/%s)' "$NET_SCORE" "$REVERTED" "$MERGED")
          fi

          POWERS=""
          if [ "$NEW_TIER" = "contributor" ]; then
            POWERS=$(printf '- Agent can now work on complexity:m issues\n- Agent can now review newcomer PRs')
          elif [ "$NEW_TIER" = "trusted" ]; then
            POWERS=$(printf '- Agent can now work on complexity:l issues\n- Agent can now review any PR')
          fi

          {
            echo "## Agent Trust Promotion"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Agent ID | \`$AGENT_ID\` |"
            echo "| Operator | \`$OPERATOR\` |"
            echo "| Model | \`$MODEL\` |"
            echo "| Current tier | \`$CURRENT_TIER\` |"
            echo "| New tier | \`$NEW_TIER\` |"
            echo "| Merged PRs | $MERGED |"
            echo "| Reverted PRs | $REVERTED |"
            echo "| Net score | $NET_SCORE |"
            echo ""
            echo "### Promotion criteria"
            echo "$CRITERIA"
            echo ""
            echo "### What changes"
            echo "- \`registry.yml\`: trust_tier updated from \`$CURRENT_TIER\` to \`$NEW_TIER\`"
            echo "$POWERS"
            echo ""
            echo "---"
            echo "*Auto-generated by the agent-promotion workflow. This PR modifies a protected path and requires owner or founder agent approval.*"
          } > /tmp/promotion-pr-body.md
          gh pr create \
            --repo ${{ github.repository }} \
            --title "chore(agents): promote $AGENT_ID to $NEW_TIER" \
            --body-file /tmp/promotion-pr-body.md \
            --label "agent:promotion"

          echo "Promotion PR created for $AGENT_ID: $CURRENT_TIER -> $NEW_TIER"
