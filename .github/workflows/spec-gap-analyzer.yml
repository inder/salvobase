name: Spec Gap Analyzer

# Self-generating backlog: diffs the codebase against the MongoDB spec
# reference and creates issues for unimplemented features.
#
# Runs weekly + manual trigger. Idempotent — won't create duplicate issues.

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9 AM UTC
  workflow_dispatch:       # Manual trigger

permissions:
  contents: read
  issues: write

jobs:
  analyze-gaps:
    name: Find Spec Gaps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yq (pinned version)
        run: |
          YQ_VERSION="v4.44.1"
          sudo wget -qO /usr/local/bin/yq "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64"
          sudo chmod +x /usr/local/bin/yq
          echo "Installed yq version: $(yq --version)"

      - name: Extract implemented commands from dispatcher.go
        id: extract-commands
        run: |
          # Parse registerAll() to find all registered command names
          IMPLEMENTED_COMMANDS=$(grep -oP 'd\.register\("\K[^"]+' internal/commands/dispatcher.go | sort -u | tr '\n' ',' | sed 's/,$//')
          echo "commands=$IMPLEMENTED_COMMANDS" >> $GITHUB_OUTPUT
          echo "Found implemented commands: $IMPLEMENTED_COMMANDS"

      - name: Extract implemented query operators from filter.go
        id: extract-query-ops
        run: |
          IMPLEMENTED_QUERY_OPS=$(grep -oP 'case "\$\K[^"]+' internal/query/filter.go | sort -u | tr '\n' ',' | sed 's/,$//')
          echo "query_ops=$IMPLEMENTED_QUERY_OPS" >> $GITHUB_OUTPUT
          echo "Found query operators: $IMPLEMENTED_QUERY_OPS"

      - name: Extract implemented update operators from update.go
        id: extract-update-ops
        run: |
          IMPLEMENTED_UPDATE_OPS=$(grep -oP 'case "\$\K[^"]+' internal/query/update.go | sort -u | tr '\n' ',' | sed 's/,$//')
          echo "update_ops=$IMPLEMENTED_UPDATE_OPS" >> $GITHUB_OUTPUT
          echo "Found update operators: $IMPLEMENTED_UPDATE_OPS"

      - name: Extract implemented aggregation stages from stages.go
        id: extract-agg-stages
        run: |
          IMPLEMENTED_AGG_STAGES=$(grep -oP 'case "\$\K[^"]+' internal/aggregation/stages.go | sort -u | tr '\n' ',' | sed 's/,$//')
          echo "agg_stages=$IMPLEMENTED_AGG_STAGES" >> $GITHUB_OUTPUT
          echo "Found aggregation stages: $IMPLEMENTED_AGG_STAGES"

      - name: Analyze spec gaps and create issues
        env:
          GH_TOKEN: ${{ github.token }}
          IMPLEMENTED_COMMANDS: ${{ steps.extract-commands.outputs.commands }}
          IMPLEMENTED_QUERY_OPS: ${{ steps.extract-query-ops.outputs.query_ops }}
          IMPLEMENTED_UPDATE_OPS: ${{ steps.extract-update-ops.outputs.update_ops }}
          IMPLEMENTED_AGG_STAGES: ${{ steps.extract-agg-stages.outputs.agg_stages }}
        run: |
          SPEC_FILE=".github/agents/mongodb-spec.yml"
          GAPS_FOUND=0
          ISSUES_CREATED=0
          ALREADY_TRACKED=0

          echo "=== Spec Gap Analysis ==="
          echo ""

          # Function: check if an issue already exists for this feature
          issue_exists() {
            local search_term="$1"
            # Search open issues for the feature name
            local count
            count=$(gh issue list \
              --state open \
              --search "$search_term" \
              --json number \
              --repo ${{ github.repository }} | jq 'length')
            [ "$count" -gt 0 ]
          }

          # Function: check if a name is in a comma-separated list
          is_implemented() {
            local name="$1"
            local list="$2"
            echo ",$list," | grep -q ",$name,"
          }

          # ---- Analyze Commands ----
          echo "--- Commands ---"
          MISSING_COMMANDS=$(yq '.commands[] | select(.status == "missing" or .status == "stubbed") | .name' "$SPEC_FILE")

          for cmd in $MISSING_COMMANDS; do
            # Strip quotes from yq output
            cmd=$(echo "$cmd" | tr -d '"')

            if is_implemented "$cmd" "$IMPLEMENTED_COMMANDS"; then
              # It's registered but we marked it as stubbed — check if it's still stubbed
              if grep -q "\"$cmd\".*not implemented\|\"$cmd\".*not supported" internal/commands/*.go 2>/dev/null; then
                echo "STUBBED: command '$cmd' (registered but returns error)"
              else
                echo "RESOLVED: command '$cmd' (now fully implemented)"
                continue
              fi
            fi

            GAPS_FOUND=$((GAPS_FOUND + 1))

            # Get metadata from spec
            AREA=$(yq ".commands[] | select(.name == \"$cmd\") | .area" "$SPEC_FILE" | tr -d '"')
            COMPLEXITY=$(yq ".commands[] | select(.name == \"$cmd\") | .complexity" "$SPEC_FILE" | tr -d '"')
            TRUST=$(yq ".commands[] | select(.name == \"$cmd\") | .trust" "$SPEC_FILE" | tr -d '"')
            PRIORITY=$(yq ".commands[] | select(.name == \"$cmd\") | .priority" "$SPEC_FILE" | tr -d '"')
            MONGO_DOC=$(yq ".commands[] | select(.name == \"$cmd\") | .mongo_doc" "$SPEC_FILE" | tr -d '"')
            NOTES=$(yq ".commands[] | select(.name == \"$cmd\") | .notes" "$SPEC_FILE" | tr -d '"')

            TITLE="feat(commands): implement $cmd command"

            if issue_exists "$cmd"; then
              echo "SKIP: '$cmd' -- issue already exists"
              ALREADY_TRACKED=$((ALREADY_TRACKED + 1))
              continue
            fi

            echo "CREATE: issue for command '$cmd'"
            gh issue create \
              --title "$TITLE" \
              --label "agent:available,area:${AREA},complexity:${COMPLEXITY},trust:${TRUST},priority:${PRIORITY},enhancement" \
              --body "$(cat <<EOF
## Spec Gap: \`$cmd\` command

**Source:** Spec Gap Analyzer (automated)
**MongoDB Reference:** $MONGO_DOC

### Description

The \`$cmd\` command is part of the MongoDB wire protocol but is not yet implemented in salvobase.

$NOTES

### Acceptance Criteria

- [ ] \`$cmd\` command handler registered in \`internal/commands/dispatcher.go\`
- [ ] Returns correct MongoDB-compatible response format
- [ ] Integration test added to \`tests/integration_test.go\`
- [ ] Error cases handled (invalid args, unauthorized, etc.)

### Files Likely Affected

- \`internal/commands/dispatcher.go\` -- register handler
- \`internal/commands/\` -- new handler file or existing file
- \`tests/integration_test.go\` -- integration tests

### Agent Provenance

\`\`\`yaml
source_agent:
  type: "spec-analyzer"
  model: "deterministic"
  operator: "github-actions"
  run_date: "$(date -u +%Y-%m-%d)"
  evidence: "Command not found in dispatcher.go registerAll()"
\`\`\`
EOF
)" \
              --repo ${{ github.repository }}

            ISSUES_CREATED=$((ISSUES_CREATED + 1))
          done

          # ---- Analyze Query Operators ----
          echo ""
          echo "--- Query Operators ---"
          MISSING_QUERY_OPS=$(yq '.query_operators[] | select(.status == "missing" or .status == "stubbed") | .name' "$SPEC_FILE")

          for op in $MISSING_QUERY_OPS; do
            op=$(echo "$op" | tr -d '"')
            op_bare=$(echo "$op" | sed 's/^\$//')

            if is_implemented "$op_bare" "$IMPLEMENTED_QUERY_OPS"; then
              # Check if it's truly implemented or just stubbed
              if grep -q "\"\\$${op_bare}\".*not implemented\|\"\\$${op_bare}\".*not supported" internal/query/filter.go 2>/dev/null; then
                echo "STUBBED: query operator '$op'"
              else
                echo "RESOLVED: query operator '$op' (now fully implemented)"
                continue
              fi
            fi

            GAPS_FOUND=$((GAPS_FOUND + 1))

            AREA=$(yq ".query_operators[] | select(.name == \"$op\") | .area" "$SPEC_FILE" | tr -d '"')
            COMPLEXITY=$(yq ".query_operators[] | select(.name == \"$op\") | .complexity" "$SPEC_FILE" | tr -d '"')
            TRUST=$(yq ".query_operators[] | select(.name == \"$op\") | .trust" "$SPEC_FILE" | tr -d '"')
            PRIORITY=$(yq ".query_operators[] | select(.name == \"$op\") | .priority" "$SPEC_FILE" | tr -d '"')
            MONGO_DOC=$(yq ".query_operators[] | select(.name == \"$op\") | .mongo_doc" "$SPEC_FILE" | tr -d '"')
            NOTES=$(yq ".query_operators[] | select(.name == \"$op\") | .notes" "$SPEC_FILE" | tr -d '"')

            TITLE="feat(query): implement $op query operator"

            if issue_exists "$op"; then
              echo "SKIP: '$op' -- issue already exists"
              ALREADY_TRACKED=$((ALREADY_TRACKED + 1))
              continue
            fi

            echo "CREATE: issue for query operator '$op'"
            gh issue create \
              --title "$TITLE" \
              --label "agent:available,area:${AREA},complexity:${COMPLEXITY},trust:${TRUST},priority:${PRIORITY},enhancement" \
              --body "$(cat <<EOF
## Spec Gap: \`$op\` query operator

**Source:** Spec Gap Analyzer (automated)
**MongoDB Reference:** $MONGO_DOC

### Description

The \`$op\` query operator is part of the MongoDB query language but is not yet fully implemented in salvobase.

$NOTES

### Acceptance Criteria

- [ ] \`$op\` operator returns correct results for valid inputs
- [ ] Edge cases handled (null, missing field, wrong type)
- [ ] Unit tests in \`internal/query/filter_test.go\`
- [ ] Integration tests in \`tests/integration_test.go\`

### Files Likely Affected

- \`internal/query/filter.go\` -- operator implementation
- \`internal/query/filter_test.go\` -- unit tests
- \`tests/integration_test.go\` -- integration tests

### Agent Provenance

\`\`\`yaml
source_agent:
  type: "spec-analyzer"
  model: "deterministic"
  operator: "github-actions"
  run_date: "$(date -u +%Y-%m-%d)"
  evidence: "Operator returns 'not implemented' error in filter.go"
\`\`\`
EOF
)" \
              --repo ${{ github.repository }}

            ISSUES_CREATED=$((ISSUES_CREATED + 1))
          done

          # ---- Analyze Aggregation Stages ----
          echo ""
          echo "--- Aggregation Stages ---"
          MISSING_AGG_STAGES=$(yq '.aggregation_stages[] | select(.status == "missing" or .status == "stubbed") | .name' "$SPEC_FILE")

          for stage in $MISSING_AGG_STAGES; do
            stage=$(echo "$stage" | tr -d '"')
            stage_bare=$(echo "$stage" | sed 's/^\$//')

            if is_implemented "$stage_bare" "$IMPLEMENTED_AGG_STAGES"; then
              if grep -q "\"\\$${stage_bare}\".*not implemented\|\"\\$${stage_bare}\".*not supported" internal/aggregation/stages.go 2>/dev/null; then
                echo "STUBBED: aggregation stage '$stage'"
              else
                echo "RESOLVED: aggregation stage '$stage' (now fully implemented)"
                continue
              fi
            fi

            GAPS_FOUND=$((GAPS_FOUND + 1))

            AREA=$(yq ".aggregation_stages[] | select(.name == \"$stage\") | .area" "$SPEC_FILE" | tr -d '"')
            COMPLEXITY=$(yq ".aggregation_stages[] | select(.name == \"$stage\") | .complexity" "$SPEC_FILE" | tr -d '"')
            TRUST=$(yq ".aggregation_stages[] | select(.name == \"$stage\") | .trust" "$SPEC_FILE" | tr -d '"')
            PRIORITY=$(yq ".aggregation_stages[] | select(.name == \"$stage\") | .priority" "$SPEC_FILE" | tr -d '"')
            MONGO_DOC=$(yq ".aggregation_stages[] | select(.name == \"$stage\") | .mongo_doc" "$SPEC_FILE" | tr -d '"')
            NOTES=$(yq ".aggregation_stages[] | select(.name == \"$stage\") | .notes" "$SPEC_FILE" | tr -d '"')

            TITLE="feat(aggregation): implement $stage pipeline stage"

            if issue_exists "$stage"; then
              echo "SKIP: '$stage' -- issue already exists"
              ALREADY_TRACKED=$((ALREADY_TRACKED + 1))
              continue
            fi

            echo "CREATE: issue for aggregation stage '$stage'"
            gh issue create \
              --title "$TITLE" \
              --label "agent:available,area:${AREA},complexity:${COMPLEXITY},trust:${TRUST},priority:${PRIORITY},enhancement" \
              --body "$(cat <<EOF
## Spec Gap: \`$stage\` aggregation stage

**Source:** Spec Gap Analyzer (automated)
**MongoDB Reference:** $MONGO_DOC

### Description

The \`$stage\` aggregation pipeline stage is part of MongoDB's aggregation framework but is not yet fully implemented in salvobase.

$NOTES

### Acceptance Criteria

- [ ] \`$stage\` stage processes documents correctly
- [ ] Edge cases handled (empty pipeline input, invalid args)
- [ ] Unit tests in \`internal/aggregation/stages_test.go\`
- [ ] Integration tests in \`tests/integration_test.go\`

### Files Likely Affected

- \`internal/aggregation/stages.go\` -- stage implementation
- \`internal/aggregation/stages_test.go\` -- unit tests
- \`tests/integration_test.go\` -- integration tests

### Agent Provenance

\`\`\`yaml
source_agent:
  type: "spec-analyzer"
  model: "deterministic"
  operator: "github-actions"
  run_date: "$(date -u +%Y-%m-%d)"
  evidence: "Stage returns 'not implemented' error in stages.go"
\`\`\`
EOF
)" \
              --repo ${{ github.repository }}

            ISSUES_CREATED=$((ISSUES_CREATED + 1))
          done

          # ---- Summary ----
          echo ""
          echo "=== Summary ==="
          echo "Total spec gaps found: $GAPS_FOUND"
          echo "Issues created: $ISSUES_CREATED"
          echo "Already tracked: $ALREADY_TRACKED"
          echo ""

          if [ "$ISSUES_CREATED" -gt 0 ]; then
            echo "::notice::Spec gap analyzer created $ISSUES_CREATED new issues."
          else
            echo "::notice::No new spec gaps found. Backlog is up to date."
          fi
