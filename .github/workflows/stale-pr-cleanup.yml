name: Stale PR Cleanup

# Monitors PRs sitting with changes_requested and escalates or closes them.
#
# Thresholds:
#   >2 days with changes_requested  → warn operator via PR comment
#   >7 days with changes_requested  → close PR, return issues to agent:available
#
# The operator is the GitHub username in the agent identity block of the PR body.
# Warnings are idempotent — a PR gets warned once, not every day.
#
# Runs daily + manual trigger.

on:
  schedule:
    - cron: '0 8 * * *'  # Daily at 8 AM UTC
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  cleanup:
    name: Warn and Close Stale PRs
    runs-on: ubuntu-latest
    steps:
      - name: Process stale PRs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          WARN_DAYS=2
          CLOSE_DAYS=7
          WARN_CUTOFF=$(date -u -d "${WARN_DAYS} days ago" +%Y-%m-%dT%H:%M:%SZ 2>/dev/null \
            || date -u -v-${WARN_DAYS}d +%Y-%m-%dT%H:%M:%SZ)
          CLOSE_CUTOFF=$(date -u -d "${CLOSE_DAYS} days ago" +%Y-%m-%dT%H:%M:%SZ 2>/dev/null \
            || date -u -v-${CLOSE_DAYS}d +%Y-%m-%dT%H:%M:%SZ)

          echo "=== Stale PR Cleanup ==="
          echo "Warn threshold:  ${WARN_DAYS} days  (cutoff: $WARN_CUTOFF)"
          echo "Close threshold: ${CLOSE_DAYS} days (cutoff: $CLOSE_CUTOFF)"
          echo ""

          WARNED=0
          CLOSED=0
          ISSUES_RETURNED=0

          # All open PRs with changes_requested older than the warn threshold
          STALE_PRS=$(gh pr list \
            --repo ${{ github.repository }} \
            --state open \
            --json number,title,updatedAt,reviewDecision,body,author \
            --jq "[.[] | select(.reviewDecision == \"CHANGES_REQUESTED\" and .updatedAt < \"$WARN_CUTOFF\")]")

          COUNT=$(echo "$STALE_PRS" | jq 'length')
          echo "PRs with changes_requested older than ${WARN_DAYS} days: $COUNT"
          echo ""

          if [ "$COUNT" -eq 0 ]; then
            echo "::notice::No stale PRs found."
            exit 0
          fi

          echo "$STALE_PRS" | jq -c '.[]' | while read -r pr; do
            PR_NUMBER=$(echo "$pr" | jq -r '.number')
            PR_TITLE=$(echo "$pr" | jq -r '.title')
            PR_BODY=$(echo "$pr" | jq -r '.body')
            PR_UPDATED=$(echo "$pr" | jq -r '.updatedAt')
            PR_AUTHOR=$(echo "$pr" | jq -r '.author.login')

            # Extract operator from the agent identity block in the PR body.
            # Falls back to the GitHub PR author if not found.
            OPERATOR=$(echo "$PR_BODY" | grep -E '^\s*operator:' | head -1 \
              | sed 's/.*operator:[[:space:]]*"*\([^"]*\)"*.*/\1/' | tr -d ' ')
            if [ -z "$OPERATOR" ]; then
              OPERATOR="$PR_AUTHOR"
            fi

            echo "PR #$PR_NUMBER: $PR_TITLE"
            echo "  Author: $PR_AUTHOR | Operator: $OPERATOR | Last updated: $PR_UPDATED"

            # Extract linked issue numbers from "Closes #N" / "Fixes #N" in PR body
            ISSUE_NUMBERS=$(echo "$PR_BODY" | grep -oiE '(closes|fixes|resolves) #[0-9]+' \
              | grep -oE '[0-9]+' || true)

            # Determine if this PR crosses the close threshold
            if [[ "$PR_UPDATED" < "$CLOSE_CUTOFF" ]]; then
              echo "  → CLOSING (>${CLOSE_DAYS} days stale)"

              PR_URL="https://github.com/${{ github.repository }}/pull/${PR_NUMBER}"
              {
                echo "### Stale PR — Auto-Closed"
                echo ""
                echo "@${OPERATOR} — this PR has had \`changes_requested\` for more than **${CLOSE_DAYS} days** with no updates. It has been closed automatically."
                echo ""
                echo "**The linked issues are now available again** for any agent to claim and complete."
                echo ""
                echo "---"
                echo ""
                echo "**If you want your agent to fix this**, open your agent (Cursor, Claude, etc.) and paste this prompt:"
                echo ""
                echo "> Go to $PR_URL, read the review feedback in the comments, and address it. The PR is now closed — create a new branch from master, apply the fix, and open a fresh PR referencing the same issues."
                echo ""
                echo "The review thread has everything your agent needs — what is wrong, where it is, and what the fix should look like."
                echo ""
                echo "<!-- stale-pr-closed -->"
              } > /tmp/stale-close-comment.md

              gh pr comment "$PR_NUMBER" \
                --body-file /tmp/stale-close-comment.md \
                --repo ${{ github.repository }}

              gh pr close "$PR_NUMBER" \
                --repo ${{ github.repository }}

              CLOSED=$((CLOSED + 1))

              # Return linked issues to agent:available
              if [ -n "$ISSUE_NUMBERS" ]; then
                for ISSUE_NUM in $ISSUE_NUMBERS; do
                  echo "  Returning issue #$ISSUE_NUM to agent:available"

                  gh issue edit "$ISSUE_NUM" \
                    --remove-label "agent:claimed,agent:in-review" \
                    --add-label "agent:available" \
                    --repo ${{ github.repository }} 2>/dev/null || true

                  gh issue comment "$ISSUE_NUM" \
                    --body "PR #${PR_NUMBER} was auto-closed after ${CLOSE_DAYS} days with no response to review feedback. This issue is available again — see the [PR #${PR_NUMBER}](../pull/${PR_NUMBER}) thread for full context on what was attempted and what feedback remains unaddressed." \
                    --repo ${{ github.repository }} 2>/dev/null || true

                  ISSUES_RETURNED=$((ISSUES_RETURNED + 1))
                done
              fi

            else
              # In the warn window (>2d, <7d). Only warn once — check for existing warning comment.
              ALREADY_WARNED=$(gh pr view "$PR_NUMBER" \
                --repo ${{ github.repository }} \
                --json comments \
                --jq '[.comments[].body | select(contains("<!-- stale-pr-warning -->"))] | length')

              if [ "$ALREADY_WARNED" -gt 0 ]; then
                echo "  → Already warned. Skipping."
              else
                echo "  → WARNING (>${WARN_DAYS} days stale, <${CLOSE_DAYS} days)"

                DAYS_LEFT=$((CLOSE_DAYS - WARN_DAYS))
                PR_URL="https://github.com/${{ github.repository }}/pull/${PR_NUMBER}"
                {
                  echo "### Stale PR Warning"
                  echo ""
                  echo "@${OPERATOR} — this PR has had \`changes_requested\` for more than **${WARN_DAYS} days** with no updates. It will be **auto-closed in ${DAYS_LEFT} days** if there is no response."
                  echo ""
                  echo "---"
                  echo ""
                  echo "**If you want your agent to fix this**, open your agent (Cursor, Claude, etc.) and paste this prompt:"
                  echo ""
                  echo "> Go to $PR_URL, read the review feedback in the comments, and fix the issues. Push the fix to the existing branch."
                  echo ""
                  echo "That's it. Your agent will handle the rest."
                  echo ""
                  echo "<!-- stale-pr-warning -->"
                } > /tmp/stale-warn-comment.md

                gh pr comment "$PR_NUMBER" \
                  --body-file /tmp/stale-warn-comment.md \
                  --repo ${{ github.repository }}

                WARNED=$((WARNED + 1))
              fi
            fi

            echo ""
          done

          echo "=== Summary ==="
          echo "PRs warned:  $WARNED"
          echo "PRs closed:  $CLOSED"
          echo "Issues returned to available: $ISSUES_RETURNED"

          if [ "$CLOSED" -gt 0 ]; then
            echo "::warning::Stale PR cleanup closed $CLOSED PRs and returned $ISSUES_RETURNED issues to available."
          elif [ "$WARNED" -gt 0 ]; then
            echo "::notice::Stale PR cleanup warned $WARNED PRs."
          else
            echo "::notice::All clear. No action needed."
          fi
