name: Bug Hunter

# Adversarial compatibility testing against the MongoDB spec.
# Runs edge-case tests against a live salvobase instance and
# auto-files bug issues for any behavioral divergence.
#
# This is Phase 5.1 of the Agent Framework — the first self-generating
# bug detection agent.

on:
  schedule:
    - cron: '0 6 * * 3'  # Every Wednesday at 6 AM UTC
  workflow_dispatch:       # Manual trigger

permissions:
  contents: read
  issues: write

jobs:
  hunt-bugs:
    name: Hunt Bugs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build salvobase
        run: go build -o ./bin/salvobase ./cmd/mongod

      - name: Start salvobase server
        run: |
          ./bin/salvobase --port 27017 --datadir /tmp/salvobase-bughunt --noauth --logLevel error &
          echo "Waiting for server..."
          for i in $(seq 1 30); do
            if nc -z localhost 27017 2>/dev/null; then
              echo "Server ready after ${i}s"
              break
            fi
            sleep 1
          done
          if ! nc -z localhost 27017 2>/dev/null; then
            echo "::error::Server failed to start within 30 seconds"
            exit 1
          fi

      - name: Run compatibility edge-case tests
        id: run-tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          cd tests

          # Run edge-case tests with verbose output and capture results
          go test -tags integration -v -count=1 -timeout 300s \
            -run "TestCompat" \
            ./... \
            -mongoURI mongodb://localhost:27017 \
            2>&1 | tee /tmp/test-output.txt || true

          # Capture exit code from test output (PIPESTATUS unreliable with pipefail+tee)
          if grep -q "^FAIL" /tmp/test-output.txt; then
            TEST_EXIT=1
          else
            TEST_EXIT=0
          fi
          echo "test_exit=$TEST_EXIT" >> $GITHUB_OUTPUT

          # Parse failures
          FAILURES=$(grep -c "^--- FAIL:" /tmp/test-output.txt 2>/dev/null || echo "0")
          echo "failures=$FAILURES" >> $GITHUB_OUTPUT

          # Extract failed test names
          FAILED_TESTS=$(grep "^--- FAIL:" /tmp/test-output.txt | sed 's/--- FAIL: //' | sed 's/ (.*//' | tr '\n' ',' | sed 's/,$//')
          echo "failed_tests=$FAILED_TESTS" >> $GITHUB_OUTPUT

          echo "Test exit code: $TEST_EXIT"
          echo "Failures: $FAILURES"
          echo "Failed tests: $FAILED_TESTS"

      - name: Run standard integration tests (regression check)
        id: run-regression
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          cd tests

          # Run ALL integration tests except TestCompat* (the compat suite)
          # Using -skip instead of negative regex to avoid silently dropping tests
          go test -tags integration -v -count=1 -timeout 300s \
            -skip "^TestCompat" \
            ./... \
            -mongoURI mongodb://localhost:27017 \
            2>&1 | tee /tmp/regression-output.txt || true

          if grep -q "^FAIL" /tmp/regression-output.txt; then
            REGRESSION_EXIT=1
          else
            REGRESSION_EXIT=0
          fi
          echo "regression_exit=$REGRESSION_EXIT" >> $GITHUB_OUTPUT

          REGRESSIONS=$(grep -c "^--- FAIL:" /tmp/regression-output.txt 2>/dev/null || echo "0")
          echo "regressions=$REGRESSIONS" >> $GITHUB_OUTPUT

      - name: File bug issues for new failures
        if: steps.run-tests.outputs.failures != '0' || steps.run-regression.outputs.regressions != '0'
        env:
          GH_TOKEN: ${{ github.token }}
          FAILURES: ${{ steps.run-tests.outputs.failures }}
          FAILED_TESTS: ${{ steps.run-tests.outputs.failed_tests }}
          REGRESSIONS: ${{ steps.run-regression.outputs.regressions }}
        run: |
          echo "=== Bug Hunter Report ==="
          echo "Compat test failures: $FAILURES"
          echo "Regression failures: $REGRESSIONS"

          BUGS_FILED=0

          # Process compatibility test failures
          if [ "$FAILURES" != "0" ] && [ -n "$FAILED_TESTS" ]; then
            IFS=',' read -ra TESTS <<< "$FAILED_TESTS"
            for test_name in "${TESTS[@]}"; do
              test_name=$(echo "$test_name" | xargs)  # trim whitespace

              # Check if bug already filed
              EXISTING=$(gh issue list \
                --state open \
                --search "$test_name" \
                --label "bug" \
                --json number \
                --repo ${{ github.repository }} | jq 'length')

              if [ "$EXISTING" -gt 0 ]; then
                echo "SKIP: Bug already filed for $test_name"
                continue
              fi

              # Extract test output for this specific test (escape for awk safety)
              escaped_name=$(printf '%s' "$test_name" | sed 's/[/\\.*\[\]^$]/\\&/g')
              TEST_OUTPUT=$(awk "/^=== RUN   ${escaped_name}$/,/^--- FAIL: ${escaped_name}/" /tmp/test-output.txt | head -50)

              # Determine area from test name
              AREA_LABEL="area:query"  # default
              case "$test_name" in
                *Aggregate*|*Group*|*Pipeline*) AREA_LABEL="area:aggregation" ;;
                *Insert*|*Delete*|*Update*|*Upsert*) AREA_LABEL="area:commands" ;;
                *Collection*|*Drop*|*List*|*Rename*) AREA_LABEL="area:commands" ;;
                *Sort*|*Project*) AREA_LABEL="area:query" ;;
                *Auth*|*User*|*Role*) AREA_LABEL="area:auth" ;;
                *Wire*|*Protocol*) AREA_LABEL="area:wire" ;;
                *Storage*|*Index*) AREA_LABEL="area:storage" ;;
              esac

              echo "FILING: Bug for $test_name (area: $AREA_LABEL)"
              TODAY=$(date -u +%Y-%m-%d)
              {
                echo "## Bug: Compatibility Test Failure"
                echo ""
                echo "**Source:** Bug Hunter Agent (automated)"
                echo "**Test:** \`$test_name\`"
                echo "**Detected:** $TODAY"
                echo ""
                echo "### Test Output"
                echo ""
                echo '```'
                echo "$TEST_OUTPUT"
                echo '```'
                echo ""
                echo "### Description"
                echo ""
                echo "The compatibility test \`$test_name\` failed, indicating a behavioral divergence from the MongoDB specification. This test exercises edge cases in salvobase's query/command handling."
                echo ""
                echo "### Fix Guidelines"
                echo ""
                echo "1. Read the test in \`tests/compat_edge_cases_test.go\` to understand expected behavior"
                echo "2. Check the [MongoDB documentation](https://www.mongodb.com/docs/manual/) for the correct behavior"
                echo "3. Fix the implementation to match MongoDB's behavior"
                echo "4. Ensure the fix doesn't break any existing integration tests"
                echo ""
                echo "### Agent Provenance"
                echo ""
                echo '```yaml'
                echo "source_agent:"
                echo "  type: \"bug-hunter\""
                echo "  model: \"deterministic\""
                echo "  operator: \"github-actions\""
                echo "  run_date: \"$TODAY\""
                echo "  evidence: \"Compatibility test failure in CI\""
                echo '```'
              } > /tmp/bug-issue-body.md
              gh issue create \
                --title "bug: compatibility test failure in $test_name" \
                --label "bug,agent:available,${AREA_LABEL},complexity:s,trust:newcomer-ok,priority:medium" \
                --body-file /tmp/bug-issue-body.md \
                --repo ${{ github.repository }}

              BUGS_FILED=$((BUGS_FILED + 1))
            done
          fi

          # Process regression failures (more critical)
          if [ "$REGRESSIONS" != "0" ]; then
            REGRESSED_TESTS=$(grep "^--- FAIL:" /tmp/regression-output.txt | sed 's/--- FAIL: //' | sed 's/ (.*//' | tr '\n' ',' | sed 's/,$//')
            IFS=',' read -ra REG_TESTS <<< "$REGRESSED_TESTS"
            for test_name in "${REG_TESTS[@]}"; do
              test_name=$(echo "$test_name" | xargs)  # trim whitespace
              EXISTING=$(gh issue list \
                --state open \
                --search "$test_name regression" \
                --label "bug" \
                --json number \
                --repo ${{ github.repository }} | jq 'length')

              if [ "$EXISTING" -gt 0 ]; then
                echo "SKIP: Regression already tracked for $test_name"
                continue
              fi

              escaped_name=$(printf '%s' "$test_name" | sed 's/[/\\.*\[\]^$]/\\&/g')
              TEST_OUTPUT=$(awk "/^=== RUN   ${escaped_name}$/,/^--- FAIL: ${escaped_name}/" /tmp/regression-output.txt | head -50)

              echo "FILING: Regression for $test_name"
              TODAY=$(date -u +%Y-%m-%d)
              {
                echo "## Regression: Previously Passing Test Now Fails"
                echo ""
                echo "**Source:** Bug Hunter Agent (automated)"
                echo "**Test:** \`$test_name\`"
                echo "**Detected:** $TODAY"
                echo "**Severity:** HIGH -- this test was previously passing"
                echo ""
                echo "### Test Output"
                echo ""
                echo '```'
                echo "$TEST_OUTPUT"
                echo '```'
                echo ""
                echo "### Description"
                echo ""
                echo "The integration test \`$test_name\` was previously passing but is now failing. This is a regression that should be investigated and fixed urgently."
                echo ""
                echo "### Agent Provenance"
                echo ""
                echo '```yaml'
                echo "source_agent:"
                echo "  type: \"bug-hunter\""
                echo "  model: \"deterministic\""
                echo "  operator: \"github-actions\""
                echo "  run_date: \"$TODAY\""
                echo "  evidence: \"Regression detected in standard integration test suite\""
                echo '```'
              } > /tmp/regression-issue-body.md
              gh issue create \
                --title "bug(regression): $test_name now failing" \
                --label "bug,agent:available,priority:high,complexity:s,trust:newcomer-ok" \
                --body-file /tmp/regression-issue-body.md \
                --repo ${{ github.repository }}

              BUGS_FILED=$((BUGS_FILED + 1))
            done
          fi

          echo ""
          echo "=== Summary ==="
          echo "Bugs filed: $BUGS_FILED"

          if [ "$BUGS_FILED" -gt 0 ]; then
            echo "::notice::Bug hunter filed $BUGS_FILED new bug issues."
          else
            echo "::notice::No new bugs found (all failures already tracked)."
          fi

      - name: Kill server
        if: always()
        run: pkill -f salvobase || true

      - name: Report health
        if: always()
        env:
          FAILURES: ${{ steps.run-tests.outputs.failures }}
          REGRESSIONS: ${{ steps.run-regression.outputs.regressions }}
        run: |
          echo "=== Bug Hunter Health Report ==="
          echo "Compat test failures: ${FAILURES:-0}"
          echo "Regression failures: ${REGRESSIONS:-0}"

          if [ "${REGRESSIONS:-0}" != "0" ]; then
            echo "::warning::REGRESSIONS DETECTED -- previously passing tests are now failing!"
          fi

          if [ "${FAILURES:-0}" = "0" ] && [ "${REGRESSIONS:-0}" = "0" ]; then
            echo "All clear. No bugs found."
          fi
