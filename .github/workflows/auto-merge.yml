name: Auto-Merge

# Triggers:
# - pull_request_review / pull_request: fire automatically but require "Approve and run"
#   for fork PRs due to GitHub's fork protection.
# - workflow_dispatch: always runs in base repo context — no fork gate. The founder
#   agent uses this to trigger auto-merge after approving a PR:
#   gh workflow run auto-merge.yml --repo inder/salvobase -f pr_number=50
on:
  pull_request_review:
    types: [submitted, dismissed]
  pull_request:
    types: [synchronize, ready_for_review, labeled, unlabeled]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to check for auto-merge'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  auto-merge:
    name: Auto-Merge Check
    runs-on: ubuntu-latest
    if: "!github.event.pull_request.draft"
    steps:
      - uses: actions/checkout@v4

      - name: Check all merge criteria
        id: check-criteria
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.inputs.pr_number || github.event.pull_request.number }}
        run: |
          echo "should_merge=false" >> $GITHUB_OUTPUT

          PR_DATA=$(gh pr view $PR_NUMBER --json body,labels,isDraft,mergeable,statusCheckRollup,files,author,headRepositoryOwner,isCrossRepository --repo ${{ github.repository }})

          # Gate 1: Not a draft
          IS_DRAFT=$(echo "$PR_DATA" | jq -r '.isDraft')
          if [ "$IS_DRAFT" = "true" ]; then
            echo "PR is a draft. Skipping."
            exit 0
          fi

          # Gate 2: No human-review-required label (protected paths — hard block)
          HAS_HUMAN_GATE=$(echo "$PR_DATA" | jq '[.labels[].name | select(. == "human-review-required")] | length')
          if [ "$HAS_HUMAN_GATE" -gt 0 ]; then
            echo "PR requires human review (protected paths). Skipping auto-merge."
            exit 0
          fi

          # Gate 2b: Newcomer PR — requires founder agent (inder) or human approval
          IS_NEWCOMER=$(echo "$PR_DATA" | jq '[.labels[].name | select(. == "newcomer-pr")] | length')
          if [ "$IS_NEWCOMER" -gt 0 ]; then
            # Check if any approving reviewer is the founder (operator: inder / GitHub user: inder)
            REVIEWS=$(gh api repos/${{ github.repository }}/pulls/$PR_NUMBER/reviews --jq '[.[] | select(.state == "APPROVED") | .user.login]')
            HAS_FOUNDER=$(echo "$REVIEWS" | jq '[.[] | select(. == "inder")] | length')
            if [ "$HAS_FOUNDER" -eq 0 ]; then
              echo "Newcomer PR needs founder agent or human approval. No founder review found."
              exit 0
            fi
            echo "Newcomer PR approved by founder agent. Proceeding."
          fi

          # Gate 3: No /veto comments
          COMMENTS=$(gh pr view $PR_NUMBER --json comments --repo ${{ github.repository }})
          if echo "$COMMENTS" | jq -r '.comments[].body' | grep -q "^/veto"; then
            echo "::error::PR has been vetoed. Cannot auto-merge."
            exit 1
          fi

          # Gate 4: All CI checks passed
          CHECKS_PENDING=$(echo "$PR_DATA" | jq '[.statusCheckRollup[] | select(.status != "COMPLETED")] | length')
          if [ "$CHECKS_PENDING" -gt 0 ]; then
            echo "Checks still pending ($CHECKS_PENDING remaining). Waiting."
            exit 0
          fi

          CHECKS_FAILED=$(echo "$PR_DATA" | jq '[.statusCheckRollup[] | select((.status == "COMPLETED") and (.conclusion != "SUCCESS"))] | length')
          if [ "$CHECKS_FAILED" -gt 0 ]; then
            echo "::error::$CHECKS_FAILED CI check(s) failed. Cannot auto-merge."
            exit 1
          fi

          # Gate 5: Protected paths — require human review if sensitive files touched
          CHANGED_FILES=$(echo "$PR_DATA" | jq -r '.files[].path')
          PROTECTED_HIT="false"
          while IFS= read -r filepath; do
            case "$filepath" in
              internal/auth/*) PROTECTED_HIT="true"; echo "::warning::Protected path touched: $filepath" ;;
              internal/wire/protocol.go) PROTECTED_HIT="true"; echo "::warning::Protected path touched: $filepath" ;;
              AGENT_PROTOCOL.md) PROTECTED_HIT="true"; echo "::warning::Protected path touched: $filepath" ;;
              .github/workflows/*) PROTECTED_HIT="true"; echo "::warning::Protected path touched: $filepath" ;;
              .github/agents/[^/]*.yml) PROTECTED_HIT="true"; echo "::warning::Protected path touched: $filepath" ;;
            esac
          done <<< "$CHANGED_FILES"

          if [ "$PROTECTED_HIT" = "true" ]; then
            echo "::error::PR modifies protected paths. Human review required regardless of trust tier."
            gh pr edit $PR_NUMBER --add-label "human-review-required" --repo ${{ github.repository }} || true
            exit 0
          fi

          # Gate 6: Independent review verification (anti-collusion enforcement)
          #
          # Trust hierarchy for identity signals:
          #   1. GitHub username (verified by GitHub, unforgeable)
          #   2. Fork owner (verified by GitHub, shows who controls the repo)
          #   3. Self-reported operator/model (untrusted, supplementary only)
          #
          # An approval is independent if ALL of these hold:
          #   - Different GitHub user than PR author (verified)
          #   - If cross-repo PR: different fork owner than PR source (verified)
          #   - Different self-reported operator (soft check, honest actors comply;
          #     bypassed if PR author omits operator field, which is acceptable
          #     since the check is supplementary, not a security boundary)
          #   - Not already counted (one vote per GitHub user, deduped)

          PR_AUTHOR=$(echo "$PR_DATA" | jq -r '.author.login')
          PR_HEAD=$(echo "$PR_DATA" | jq -r '.headRepositoryOwner.login')
          PR_IS_FORK=$(echo "$PR_DATA" | jq -r '.isCrossRepository')
          PR_BODY=$(echo "$PR_DATA" | jq -r '.body // ""')
          AUTHOR_OPERATOR=$(echo "$PR_BODY" | grep "operator:" | head -1 | sed 's/.*operator:[[:space:]]*"\{0,1\}\([^"]*\)"\{0,1\}.*/\1/' | tr -d ' ')

          echo "PR author: $PR_AUTHOR (fork owner: $PR_HEAD, cross-repo: $PR_IS_FORK, claimed operator: ${AUTHOR_OPERATOR:-<none>})"

          # Get all approved reviews
          REVIEWS=$(gh api repos/${{ github.repository }}/pulls/$PR_NUMBER/reviews --jq '[.[] | select(.state == "APPROVED") | {user: .user.login, body: .body}]')

          # Guard against unexpected API response
          if [ "$(echo "$REVIEWS" | jq 'type')" != '"array"' ]; then
            echo "::error::Reviews API returned unexpected shape. Aborting."
            exit 1
          fi

          # Count independent approvals using temp files (avoids subshell variable loss)
          COUNTER_FILE=$(mktemp)
          SEEN_USERS_FILE=$(mktemp)
          trap 'rm -f "$COUNTER_FILE" "$SEEN_USERS_FILE"' EXIT
          echo "0" > "$COUNTER_FILE"

          echo "$REVIEWS" | jq -c '.[]' | while read -r review; do
            REVIEWER=$(echo "$review" | jq -r '.user')
            REVIEW_BODY=$(echo "$review" | jq -r '.body // ""')

            # Check 1: skip self-reviews (GitHub username, verified)
            if [ "$REVIEWER" = "$PR_AUTHOR" ]; then
              echo "REJECT $REVIEWER: self-review"
              continue
            fi

            # Check 2: deduplicate (one vote per GitHub user)
            if grep -qF "$REVIEWER" "$SEEN_USERS_FILE" 2>/dev/null; then
              echo "REJECT $REVIEWER: already counted"
              continue
            fi

            # Check 3: for cross-repo PRs, skip if reviewer owns the source fork (verified)
            # Same fork owner = likely same person running two agents from one fork
            if [ "$PR_IS_FORK" = "true" ] && [ "$REVIEWER" = "$PR_HEAD" ]; then
              echo "REJECT $REVIEWER: owns the source fork"
              continue
            fi

            # Check 4: soft anti-collusion on self-reported operator
            # Catches honest actors running multiple agents under one identity.
            # Spoofable, but lying gets you flagged by the founder agent.
            # Only applies when both author and reviewer declare an operator.
            REVIEWER_OPERATOR=$(echo "$REVIEW_BODY" | grep "operator:" | head -1 | sed 's/.*operator:[[:space:]]*"\{0,1\}\([^"]*\)"\{0,1\}.*/\1/' | tr -d ' ')
            if [ -n "$REVIEWER_OPERATOR" ] && [ -n "$AUTHOR_OPERATOR" ] && [ "$REVIEWER_OPERATOR" = "$AUTHOR_OPERATOR" ]; then
              echo "REJECT $REVIEWER: same self-reported operator ($REVIEWER_OPERATOR) as PR author"
              continue
            fi

            # Passed all checks
            echo "$REVIEWER" >> "$SEEN_USERS_FILE"
            CURRENT=$(cat "$COUNTER_FILE")
            echo "$((CURRENT + 1))" > "$COUNTER_FILE"
            echo "ACCEPT $REVIEWER: independent (operator: ${REVIEWER_OPERATOR:-<human>})"
          done

          INDEPENDENT=$(cat "$COUNTER_FILE")
          echo "Independent approvals: $INDEPENDENT"

          if [ "$INDEPENDENT" -lt 1 ]; then
            echo "Need at least 1 independent approval. Have $INDEPENDENT."
            exit 0
          fi

          # Gate 7: Mergeable state
          MERGEABLE=$(echo "$PR_DATA" | jq -r '.mergeable')
          if [ "$MERGEABLE" != "MERGEABLE" ]; then
            echo "PR is not mergeable (state: $MERGEABLE). May need rebase."
            exit 0
          fi

          echo "All gates passed. PR #$PR_NUMBER is eligible for merge."
          echo "should_merge=true" >> $GITHUB_OUTPUT

      - name: Merge PR
        if: steps.check-criteria.outputs.should_merge == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.inputs.pr_number || github.event.pull_request.number }}
        run: |
          gh pr merge $PR_NUMBER \
            --squash \
            --admin \
            --repo ${{ github.repository }} \
            --body "Auto-merged by Salvobase Agent Framework. All CI checks passed and review criteria met."

          echo "PR #$PR_NUMBER merged successfully."
